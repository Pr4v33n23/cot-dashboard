name: Daily news ingest

# Pulls yfinance ticker news daily at 14:00 UTC. Keeps the news rail fresh
# between weekly CFTC releases. Scheduled-event calendars are static so they
# don't need a recurring fetch.

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  ingest-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Refresh news cache
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, 'packages')
          from pathlib import Path
          from ingest.universe import UNIVERSE
          from ingest import news

          n = news.load_all_news(UNIVERSE, cache_dir=Path('research/data/cache'))
          print(f'news rows: {len(n):,}')
          print(n.groupby('source').size())
          PY

      - name: Refresh live API
        if: env.REFRESH_URL != ''
        env:
          REFRESH_URL: ${{ secrets.REFRESH_URL }}
        run: |
          curl -fsS -X POST "$REFRESH_URL/refresh" || echo "refresh failed (non-fatal)"
